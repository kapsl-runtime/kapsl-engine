name: Windows Runtime Check

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "aimod-runtime/**"
      - ".github/workflows/windows-runtime-check.yml"
  push:
    branches:
      - main
    paths:
      - "aimod-runtime/**"
      - ".github/workflows/windows-runtime-check.yml"

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  windows-runtime-check:
    name: Cargo check (Windows runtime)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cargo check runtime crates
        shell: pwsh
        run: |
          cargo check --manifest-path aimod-runtime/Cargo.toml --target x86_64-pc-windows-msvc -p aimod-shm -p aimod-pyo3 -p kapsl

      - name: Cargo check IPC deepseek example
        shell: pwsh
        run: |
          cargo check --manifest-path aimod-runtime/Cargo.toml --target x86_64-pc-windows-msvc -p aimod-ipc --example deepseek_client
