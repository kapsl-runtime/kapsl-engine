name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  cargo-check:
    name: Cargo check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        if: runner.os != 'Windows'
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.92.0

      - name: Set up Rust (Windows)
        if: runner.os == 'Windows'
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.92.0
          targets: x86_64-pc-windows-msvc

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Check runtime workspace
        if: runner.os != 'Windows'
        run: cargo check --manifest-path kapsl-runtime/Cargo.toml --workspace

      - name: Check runtime CLI (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: cargo check --manifest-path kapsl-runtime/Cargo.toml --target x86_64-pc-windows-msvc -p kapsl

      - name: Check runtime benchmarks (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: cargo check --manifest-path kapsl-runtime/Cargo.toml --target x86_64-pc-windows-msvc -p shm-bench-native -p native-hybrid-client
