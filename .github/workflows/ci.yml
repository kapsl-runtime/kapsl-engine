name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  cargo-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.92.0

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Check runtime workspace
        run: cargo check --manifest-path kapsl-runtime/Cargo.toml --workspace
