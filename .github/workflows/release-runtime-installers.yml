name: Release Runtime Installers

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-runtime-installers:
    name: Build runtime installer (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate tag matches runtime version (Unix)
        if: runner.os != 'Windows' && startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          manifest_version="$(grep -m1 '^version = ' kapsl-runtime/crates/kapsl-cli/Cargo.toml | cut -d '"' -f2)"
          tag_version="${GITHUB_REF_NAME#v}"
          if [ "$manifest_version" != "$tag_version" ]; then
            echo "Tag version ($tag_version) does not match kapsl runtime version ($manifest_version)."
            exit 1
          fi

      - name: Validate tag matches runtime version (Windows)
        if: runner.os == 'Windows' && startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          $cargoToml = Get-Content "kapsl-runtime/crates/kapsl-cli/Cargo.toml"
          $manifestVersion = ($cargoToml | Where-Object { $_ -match '^version\s*=\s*".+"' } | Select-Object -First 1) -replace '.*"(.+)".*', '$1'
          $tagVersion = $env:GITHUB_REF_NAME.TrimStart("v")
          if ($manifestVersion -ne $tagVersion) {
            throw "Tag version ($tagVersion) does not match kapsl runtime version ($manifestVersion)."
          }

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.92.0

      - name: Install WiX Toolset
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install wixtoolset --no-progress -y
          $wixBin = "C:\Program Files (x86)\WiX Toolset v3.11\bin"
          if (Test-Path $wixBin) {
            Add-Content -Path $env:GITHUB_PATH -Value $wixBin
          }

      - name: Resolve runtime version (Unix)
        if: runner.os != 'Windows'
        run: |
          raw_version="$(grep -m1 '^version = ' kapsl-runtime/crates/kapsl-cli/Cargo.toml | cut -d '"' -f2)"

          if [ "${GITHUB_REF_TYPE:-}" = "tag" ] && [ -n "${GITHUB_REF_NAME:-}" ]; then
            raw_version="${GITHUB_REF_NAME#v}"
          fi

          if [[ "$raw_version" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+) ]]; then
            numeric_version="${BASH_REMATCH[1]}.${BASH_REMATCH[2]}.${BASH_REMATCH[3]}"
          else
            numeric_version="0.1.0"
          fi

          deb_version="$(echo "$raw_version" | sed 's/-/~/g')"

          echo "KAPSL_VERSION=$raw_version" >> "$GITHUB_ENV"
          echo "KAPSL_NUMERIC_VERSION=$numeric_version" >> "$GITHUB_ENV"
          echo "KAPSL_DEB_VERSION=$deb_version" >> "$GITHUB_ENV"

      - name: Resolve runtime version (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $cargoToml = Get-Content "kapsl-runtime/crates/kapsl-cli/Cargo.toml"
          $rawVersion = ($cargoToml | Where-Object { $_ -match '^version\s*=\s*".+"' } | Select-Object -First 1) -replace '.*"(.+)".*', '$1'

          if ($env:GITHUB_REF_TYPE -eq "tag" -and $env:GITHUB_REF_NAME) {
            $rawVersion = $env:GITHUB_REF_NAME.TrimStart("v")
          }

          if ($rawVersion -match '^(\d+)\.(\d+)\.(\d+)') {
            $numericVersion = "$($Matches[1]).$($Matches[2]).$($Matches[3])"
          } else {
            $numericVersion = "0.1.0"
          }

          $debVersion = $rawVersion -replace '-', '~'

          "KAPSL_VERSION=$rawVersion" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "KAPSL_NUMERIC_VERSION=$numericVersion" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "KAPSL_DEB_VERSION=$debVersion" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Build kapsl
        if: runner.os != 'Windows'
        run: cargo build --manifest-path kapsl-runtime/Cargo.toml -p kapsl --release

      - name: Build kapsl (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          RUSTFLAGS: -C debuginfo=0 -C link-arg=/DEBUG:NONE
          CARGO_INCREMENTAL: "0"
        run: cargo build --manifest-path kapsl-runtime/Cargo.toml -p kapsl --release

      - name: Package Debian installer (.deb)
        if: runner.os == 'Linux'
        run: |
          mkdir -p dist pkgroot/DEBIAN pkgroot/usr/local/bin
          install -m 755 kapsl-runtime/target/release/kapsl pkgroot/usr/local/bin/kapsl

          arch="$(dpkg --print-architecture)"

          {
            echo "Package: kapsl-runtime"
            echo "Version: ${KAPSL_DEB_VERSION}"
            echo "Section: utils"
            echo "Priority: optional"
            echo "Architecture: ${arch}"
            echo "Maintainer: Kapsl Team <support@kapsl.ai>"
            echo "Description: Kapsl runtime CLI and local inference server."
          } > pkgroot/DEBIAN/control

          deb_path="dist/kapsl-runtime_${KAPSL_DEB_VERSION}_${arch}.deb"
          dpkg-deb --build pkgroot "${deb_path}"
          sha256sum "${deb_path}" > "${deb_path}.sha256"
          ls -la dist

      - name: Package macOS installer (.pkg)
        if: runner.os == 'macOS'
        run: |
          mkdir -p dist pkgroot/usr/local/bin
          install -m 755 kapsl-runtime/target/release/kapsl pkgroot/usr/local/bin/kapsl

          arch_name="$(echo "${RUNNER_ARCH}" | tr '[:upper:]' '[:lower:]')"
          case "${arch_name}" in
            x64) arch_name="x86_64" ;;
            arm64) arch_name="aarch64" ;;
          esac

          pkg_path="dist/kapsl-runtime-${KAPSL_VERSION}-macos-${arch_name}.pkg"
          pkgbuild \
            --root pkgroot \
            --identifier com.kapsl.runtime \
            --version "${KAPSL_NUMERIC_VERSION}" \
            --install-location / \
            "${pkg_path}"

          shasum -a 256 "${pkg_path}" > "${pkg_path}.sha256"
          ls -la dist

      - name: Package Windows installer (.msi)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist -Force | Out-Null
          New-Item -ItemType Directory -Path wix -Force | Out-Null

          $runnerArch = $env:RUNNER_ARCH.ToLower()
          $arch = $runnerArch
          if ($arch -eq "x64") { $arch = "x86_64" }
          if ($arch -eq "arm64") { $arch = "aarch64" }

          $wixArch = "x86"
          $programFilesFolderId = "ProgramFilesFolder"
          $win64 = "no"
          if ($runnerArch -eq "x64") {
            $wixArch = "x64"
            $programFilesFolderId = "ProgramFiles64Folder"
            $win64 = "yes"
          }
          if ($runnerArch -eq "arm64") {
            $wixArch = "arm64"
            $programFilesFolderId = "ProgramFiles64Folder"
            $win64 = "yes"
          }

          $msiName = "kapsl-runtime-$($env:KAPSL_VERSION)-windows-$arch.msi"
          Copy-Item "kapsl-runtime/target/release/kapsl.exe" "wix/kapsl.exe" -Force

          $wxsLines = @(
            '<?xml version="1.0" encoding="UTF-8"?>'
            '<Wix xmlns="http://schemas.microsoft.com/wix/2006/wi">'
            '  <Product'
            '    Id="*"'
            '    Name="Kapsl Runtime"'
            '    Language="1033"'
            "    Version=""$($env:KAPSL_NUMERIC_VERSION)"""
            '    Manufacturer="Kapsl"'
            '    UpgradeCode="{DF997FCA-4EFD-447B-B368-376A32522B9B}">'
            '    <Package InstallerVersion="500" Compressed="yes" InstallScope="perMachine" />'
            '    <MajorUpgrade DowngradeErrorMessage="A newer version of Kapsl Runtime is already installed." />'
            '    <MediaTemplate EmbedCab="yes" />'
            '    <Directory Id="TARGETDIR" Name="SourceDir">'
            "      <Directory Id=""$programFilesFolderId"">"
            '        <Directory Id="INSTALLFOLDER" Name="Kapsl">'
            "          <Component Id=""KapslExeComponent"" Guid=""*"" Win64=""$win64"">"
            '            <File Id="KapslExeFile" Source="kapsl.exe" KeyPath="yes" />'
            '          </Component>'
            '        </Directory>'
            '      </Directory>'
            '    </Directory>'
            '    <Feature Id="MainFeature" Title="Kapsl Runtime" Level="1">'
            '      <ComponentRef Id="KapslExeComponent" />'
            '    </Feature>'
            '  </Product>'
            '</Wix>'
          )
          $wxsLines | Set-Content -Path "wix/installer.wxs" -Encoding utf8

          Push-Location "wix"
          candle.exe -arch $wixArch installer.wxs
          light.exe installer.wixobj -o "../dist/$msiName"
          Pop-Location

          $hash = (Get-FileHash -Path "dist/$msiName" -Algorithm SHA256).Hash.ToLower()
          "$hash  $msiName" | Set-Content -Path "dist/$msiName.sha256"

          Get-ChildItem dist

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: runtime-installers-${{ matrix.os }}
          path: dist/*
          if-no-files-found: error

  upload-release-assets:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-runtime-installers
    runs-on: ubuntu-latest
    steps:
      - name: Download installer artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/**

  upload-r2:
    needs: build-runtime-installers
    runs-on: ubuntu-latest
    steps:
      - name: Download installer artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Resolve upload version
        id: version
        shell: bash
        run: |
          if [ "${GITHUB_REF_TYPE:-}" = "tag" ] && [ -n "${GITHUB_REF_NAME:-}" ]; then
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=dev" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure AWS credentials (R2)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.R2_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          aws-region: auto

      - name: Upload installers to R2
        run: |
          aws s3 cp release-assets/ \
            s3://kapsl-installer/runtime/v${{ steps.version.outputs.version }}/ \
            --recursive \
            --no-progress \
            --endpoint-url https://b93d1b956d4a35c986540bb51f7404a2.r2.cloudflarestorage.com
