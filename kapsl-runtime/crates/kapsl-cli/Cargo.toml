[package]
name = "kapsl"
version = "0.1.0"
edition = "2021"

[features]
default = []
infer-adapter-echo = []

[dependencies]
kapsl-core = { path = "../kapsl-core" }
kapsl-hal = { path = "../kapsl-hal" }
kapsl-engine-api = { path = "../kapsl-engine-api" }
kapsl-backends = { path = "../kapsl-backends" }
kapsl-scheduler = { path = "../kapsl-scheduler" }
kapsl-ipc = { path = "../kapsl-ipc" }
kapsl-monitor = { path = "../kapsl-monitor" }
kapsl-transport = { path = "../kapsl-transport" }
kapsl-shm = { path = "../kapsl-shm" }
kapsl-llm = { path = "../kapsl-llm" }
kapsl-rag = { path = "../kapsl-rag" }
kapsl-rag-sdk = { path = "../kapsl-rag-sdk" }
warp = "0.3"
prometheus = "0.14"
parking_lot = "0.12"
clap = { version = "4.4", features = ["derive"] }
tokio = { version = "1.0", features = ["full"] }
env_logger = "0.10"
log = "0.4"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
bincode = "1.3"
futures = "0.3"
serde_yaml = "0.9"
async-trait = "0.1"
sysinfo = "0.30"
flate2 = "1.0"
tar = "0.4"
base64 = "0.22"
image = { version = "0.25", default-features = false, features = ["bmp", "gif", "ico", "jpeg", "png", "tiff", "webp"] }
ureq = { version = "3.1.4", default-features = false, features = ["native-tls"] }
rand = "0.8"
sha2 = "0.10"
