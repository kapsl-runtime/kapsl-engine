id = "connector.azure-blob"
name = "Azure Blob Connector"
version = "0.1.0"
runtime = "sidecar"
capabilities = ["sync"]
auth = ["api-key", "none"]
permissions = []
description = "RAG connector for syncing documents from Azure Blob Storage"
entrypoint = "connector"

[config_schema]
type = "object"
additionalProperties = true
required = ["container"]

[config_schema.properties.container]
type = "string"
description = "Azure Blob container name"

[config_schema.properties.connection_string]
type = "string"
description = "Optional Azure Storage connection string"

[config_schema.properties.account_url]
type = "string"
description = "Optional account URL, e.g. https://<account>.blob.core.windows.net"

[config_schema.properties.credential]
type = "string"
description = "Optional account key or SAS token when using account_url"

[config_schema.properties.prefix]
type = "string"
description = "Optional prefix to scope blobs"

[config_schema.properties.source_id]
type = "string"
description = "Override source identifier"

[config_schema.properties.source_name]
type = "string"
description = "Override display name"

[config_schema.properties.include_extensions]
type = "array"
description = "Optional blob suffix filter"
items = { type = "string" }

[config_schema.properties.max_sync_documents]
type = "integer"
description = "Maximum number of deltas returned by one sync"
minimum = 1
